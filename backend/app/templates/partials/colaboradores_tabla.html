<tbody id="tabla-colaboradores">
    {% for c in colaboradores %}
    <tr class="border-b border-slate-800 hover:bg-slate-800/50">
        <td class="p-3 font-mono text-xs">{{ c.identificador }}</td>
        <td class="p-3 font-medium">{{ c.nombre }}</td>
        <td class="p-3 text-slate-400">{{ c.email or '—' }}</td>
        <td class="p-3 text-slate-400">{{ c.telefono or '—' }}</td>
        <td class="p-3 text-right">
            <button onclick="editarColab('{{ c.identificador }}','{{ c.nombre }}','{{ c.email or '' }}','{{ c.telefono or '' }}')"
                    class="text-xs text-brand hover:text-brand-light">Editar</button>
            <button hx-delete="/colaboradores/{{ c.identificador }}/eliminar" hx-target="#tabla-colaboradores" hx-swap="outerHTML"
                    hx-confirm="¿Eliminar a {{ c.nombre }}?"
                    class="text-xs text-red-400 hover:text-red-300 ml-2">Eliminar</button>
        </td>
    </tr>
    {% else %}
    <tr><td colspan="5" class="p-6 text-center text-slate-500">No hay colaboradores registrados</td></tr>
    {% endfor %}
</tbody>
