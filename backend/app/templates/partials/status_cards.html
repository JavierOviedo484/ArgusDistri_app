<div class="space-y-1.5">
    <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg" style="background:#f0fdf4;border:1px solid #bbf7d0;">
        <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
        <span class="text-xs font-semibold" style="color:#15803d;">Sistema activo</span>
    </div>
    <div class="grid grid-cols-2 gap-1.5">
        <div class="card py-2 px-2 text-center">
            <div class="text-lg font-bold" style="color:#2563eb;">{{ pdfs_pendientes }}</div>
            <div class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider">PDFs</div>
        </div>
        <div class="card py-2 px-2 text-center">
            <div class="text-lg font-bold" style="color:#2563eb;">{{ colaboradores }}</div>
            <div class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider">Colabs</div>
        </div>
        <div class="card py-2 px-2 text-center">
            <div class="text-lg font-bold" style="color:#059669;">{{ facturas }}</div>
            <div class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider">Docs</div>
        </div>
        <div class="card py-2 px-2 text-center">
            <div class="text-lg font-bold" style="color:{%if pendientes>0%}#d97706{%else%}#cbd5e1{%endif%};">{{ pendientes }}</div>
            <div class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider">Pend.</div>
        </div>
    </div>
</div>
