<div class="max-w-6xl mx-auto space-y-6">
    <!-- Marca ARGUS arriba-centro -->
    <div class="text-center pt-4 pb-2">
        <div style="font-size:3rem;font-weight:800;color:#0f172a;letter-spacing:-0.03em;line-height:1;">
            ARG<span style="color:#2563eb;">US</span>
        </div>
        <div style="font-size:0.95rem;color:#475569;font-weight:600;letter-spacing:0.02em;margin-top:0.35rem;">
            Distribuidor de documentos
        </div>
    </div>

    <!-- Cabecera -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-xl font-bold text-slate-900">Dashboard</h1>
            <p class="text-sm text-slate-500 mt-0.5">Escanea PDFs, asigna colaboradores y distribuye documentos</p>
        </div>
        <button onclick="borrarTodo()" class="btn btn-danger btn-sm">
            🗑️ Borrar Todo
        </button>
    </div>

    <!-- Selector de carpeta -->
    <div class="card">
        <div class="flex items-end gap-3">
            <div class="flex-1">
                <label class="text-xs text-slate-500 font-medium block mb-1.5">📂 Carpeta de origen (PDFs)</label>
                <input id="carpeta-input" name="carpeta" type="text"
                       value="/mnt/c/Users/javie/Desktop/AUTOM/Correos/facturas"
                       class="input font-mono text-xs">
            </div>
            <button hx-post="/escaneo-html" hx-include="#carpeta-input" hx-target="#resultados"
                    hx-swap="innerHTML" hx-indicator="#spinner"
                    class="btn btn-primary">
                🔍 Escanear
            </button>
        </div>
        <p class="text-[10px] text-slate-400 mt-2">Ruta absoluta en WSL — ej: /mnt/c/Users/... o data/pdfs_entrada</p>
    </div>

    <!-- Acciones masivas -->
    <div id="acciones-masivas" class="hidden flex gap-2 items-center flex-wrap">
        <button hx-get="/resumen-envio/email" hx-target="#panel-verificacion" hx-swap="innerHTML"
                class="btn btn-sm" style="background:#2563eb;color:white;">
            📧 Enviar todo por Email
        </button>
        <button hx-get="/resumen-envio/whatsapp" hx-target="#panel-verificacion" hx-swap="innerHTML"
                class="btn btn-sm" style="background:#059669;color:white;">
            💬 Enviar todo por WhatsApp
        </button>
        <span class="text-xs text-slate-400">Verás la lista antes de confirmar.</span>
    </div>

    <div id="panel-verificacion"></div>
    <div id="resultado-envio"></div>

    <!-- Resultados -->
    <div id="resultados">
        <div class="text-center py-16">
            <p class="text-5xl mb-4 opacity-40">📂</p>
            <p class="text-slate-400 text-sm">Selecciona la carpeta y presiona <strong class="text-slate-600">Escanear</strong></p>
        </div>
    </div>

    <!-- Spinner -->
    <div id="spinner" class="htmx-indicator text-center py-6 hidden">
        <div class="inline-flex items-center gap-3">
            <svg class="animate-spin h-5 w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="text-sm text-slate-500">Procesando PDFs...</span>
        </div>
    </div>
</div>

<script>
document.body.addEventListener('htmx:afterSwap', function(evt) {
    if (evt.detail.target.id === 'resultados') {
        const m = document.getElementById('acciones-masivas');
        if (m) m.classList.remove('hidden');
    }
});

function borrarTodo() {
    if (!confirm('⚠️ Esto borrará todos los colaboradores, facturas y registros.\nLos PDFs de entrada NO se tocan.\n\nEsta acción no se puede deshacer. ¿Continuar?')) return;
    htmx.ajax('POST', '/borrar-todo', { target: '#resultados', swap: 'innerHTML' });
}
</script>
