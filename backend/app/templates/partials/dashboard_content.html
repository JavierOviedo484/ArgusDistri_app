<div class="max-w-6xl mx-auto space-y-6">

    <!-- ─── Toast flotante para feedback de envío ─── -->
    <div id="toast-envio" class="fixed top-5 left-1/2 -translate-x-1/2 z-[9999] pointer-events-none" style="transition:opacity 0.3s;"></div>

    <!-- Marca ARGUS arriba-centro -->
    <div class="text-center pt-4 pb-2">
        <div style="font-size:3rem;font-weight:800;color:#0f172a;letter-spacing:-0.03em;line-height:1;">
            ARG<span style="color:#0145bc;">US</span>
        </div>
        <div style="font-size:0.95rem;color:#475569;font-weight:600;letter-spacing:0.02em;margin-top:0.35rem;">
            Distribuidor de documentos
        </div>
    </div>

    <!-- Cabecera -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-xl font-bold text-slate-900">Dashboard</h1>
            <p class="text-sm text-slate-500 mt-0.5">Escanea PDFs, asigna colaboradores y distribuye documentos</p>
        </div>
        <button onclick="borrarTodo()" class="btn btn-danger btn-sm">
            🗑️ Borrar Todo
        </button>
    </div>

    <!-- Selector de carpeta -->
    <div class="card">
        <div class="flex items-end gap-3">
            <div class="flex-1">
                <label class="text-xs text-slate-500 font-medium block mb-1.5">📂 Carpeta de origen (PDFs)</label>
                <div class="flex gap-2 items-center">
                    <input id="carpeta-input" name="carpeta" type="text"
                           value="/mnt/c/Users/javie/Desktop/AUTOM/Correos/facturas"
                           class="input font-mono text-xs flex-1"
                           placeholder="Escribe la ruta o haz clic en Browse PC">
                    <input type="file" id="folder-picker" webkitdirectory multiple accept=".pdf"
                           style="display:none" onchange="uploadFolder(this)">
                    <button onclick="document.getElementById('folder-picker').click()"
                            class="btn btn-sm btn-ghost whitespace-nowrap" type="button">
                        📁 Browse PC
                    </button>
                    <span id="upload-status" class="text-xs hidden"></span>
                </div>
            </div>
            <button id="btn-escanear" hx-post="/escaneo-html" hx-include="#carpeta-input" hx-target="#resultados"
                    hx-swap="innerHTML" hx-indicator="#spinner"
                    class="btn btn-primary">
                🔍 Escanear
            </button>
        </div>
        <p class="text-[10px] text-slate-400 mt-2">Ruta absoluta WSL (ej: /mnt/c/Users/...) o <strong>Browse PC</strong> para elegir carpeta con el explorador de Windows</p>
    </div>

    <!-- Resultados -->
    <div id="resultados" hx-get="/facturas-html" hx-trigger="load, refrescarFacturas from:body"
         hx-swap="innerHTML">
        <div class="text-center py-16">
            <p class="text-slate-400 text-sm">Cargando…</p>
        </div>
    </div>

    <!-- Spinner -->
    <div id="spinner" class="htmx-indicator text-center py-6 hidden">
        <div class="inline-flex items-center gap-3">
            <svg class="animate-spin h-5 w-5 text-[#0145bc]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="text-sm text-slate-500">Procesando PDFs...</span>
        </div>
    </div>
</div>

<script>
// ─── Funciones globales de preview y edición (siempre disponibles) ───

function abrirPreview(facturaId) {
    fetch('/preview-factura/' + facturaId)
        .then(r => r.text())
        .then(html => {
            const div = document.createElement('div');
            div.innerHTML = html;
            document.body.appendChild(div.firstElementChild || div);
        })
        .catch(e => alert('Error al cargar preview: ' + e.message));
}

function cerrarModal() {
    const m = document.getElementById('modal-overlay');
    if (m) m.remove();
}
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') cerrarModal();
});

function abrirEditColab(id, nombre, email, telefono) {
    document.getElementById('edit-colab-id').value = id;
    document.getElementById('edit-colab-nombre').value = nombre;
    document.getElementById('edit-colab-email').value = email === 'None' ? '' : email;
    document.getElementById('edit-colab-telefono').value = telefono === 'None' ? '' : telefono;
    document.getElementById('modal-edit-colab').classList.remove('hidden');
}
function cerrarEditColab() {
    document.getElementById('modal-edit-colab').classList.add('hidden');
    htmx.ajax('GET', '/facturas-html', { target: '#resultados', swap: 'innerHTML' });
}

function borrarTodo() {
    if (!confirm('⚠️ Esto borrará todos los colaboradores, facturas y registros.\nLos PDFs de entrada NO se tocan.\n\nEsta acción no se puede deshacer. ¿Continuar?')) return;
    htmx.ajax('POST', '/borrar-todo', { target: '#resultado-envio', swap: 'innerHTML' });
}

function uploadFolder(input) {
    if (!input.files || input.files.length === 0) return;
    const pdfs = Array.from(input.files).filter(f => f.name.toLowerCase().endsWith('.pdf'));
    if (pdfs.length === 0) {
        alert('No se encontraron archivos PDF en la carpeta seleccionada.');
        return;
    }
    const folderName = pdfs[0].webkitRelativePath.split('/')[0];

    // Mostrar status — NO tocamos el input de ruta
    const status = document.getElementById('upload-status');
    const spinner = document.getElementById('spinner');
    const btn = document.getElementById('btn-escanear');
    status.className = 'text-xs text-blue-600 font-medium';
    status.textContent = '📤 Subiendo ' + pdfs.length + ' PDFs...';
    if (spinner) spinner.classList.remove('hidden');
    if (btn) btn.disabled = true;

    const formData = new FormData();
    formData.append('carpeta_nombre', folderName);
    for (const pdf of pdfs) {
        formData.append('pdfs', pdf, pdf.webkitRelativePath);
    }

    fetch('/escanear-subir', {
        method: 'POST',
        body: formData,
        credentials: 'same-origin'
    })
    .then(async r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
    })
    .then(html => {
        document.getElementById('resultados').innerHTML = html;
        status.className = 'text-xs text-green-600 font-medium';
        status.textContent = '✅ ' + pdfs.length + ' PDFs escaneados desde ' + folderName;
        setTimeout(() => { status.className = 'text-xs hidden'; }, 5000);
        input.value = '';
        if (spinner) spinner.classList.add('hidden');
        if (btn) btn.disabled = false;
    })
    .catch(e => {
        status.className = 'text-xs text-red-500 font-medium';
        status.textContent = '❌ Error: ' + e.message;
        if (spinner) spinner.classList.add('hidden');
        if (btn) btn.disabled = false;
    });
}

// ─── Toast de envío: mensaje en pantalla al enviar ───
var toastTimer = null;

document.body.addEventListener('htmx:beforeRequest', function(evt) {
    var el = evt.detail.elt;
    if (!el || !el.getAttribute) return;
    var hxPost = el.getAttribute('hx-post') || '';
    var hxGet = el.getAttribute('hx-get') || '';
    var path = hxPost || hxGet;
    // Solo para botones de envío
    if (!path.match(/\/api\/v1\/enviar\/|\/api\/v1\/enviar-lote\/|\/resumen-envio\//)) return;
    mostrarToast('⏳ <strong>Espere, se está enviando…</strong>', 'bg-blue-600');
});

document.body.addEventListener('htmx:afterRequest', function(evt) {
    var el = evt.detail.elt;
    if (!el || !el.getAttribute) return;
    var hxPost = el.getAttribute('hx-post') || '';
    var hxGet = el.getAttribute('hx-get') || '';
    var path = hxPost || hxGet;

    // Para envío individual (api/v1/enviar/) el backend envía mostrarToast preciso
    if (path.indexOf('/api/v1/enviar/') !== -1) return;

    var canal = '';
    if (path.indexOf('email') !== -1) canal = 'Email';
    else if (path.indexOf('whatsapp') !== -1) canal = 'WhatsApp';
    else if (path.indexOf('sms') !== -1) canal = 'SMS';
    if (!canal) return;

    if (evt.detail.successful) {
        mostrarToast('✅ <strong>¡' + canal + ' enviado!</strong>', 'bg-emerald-600');
    } else {
        mostrarToast('❌ <strong>Error al enviar por ' + canal + '</strong>', 'bg-red-600');
    }
});

function mostrarToast(html, bgClass) {
    var el = document.getElementById('toast-envio');
    if (!el) return;
    el.innerHTML = '<div class="' + bgClass + ' text-white px-6 py-3 rounded-xl shadow-2xl text-sm font-semibold animate-fade-in">' + html + '</div>';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() {
        el.innerHTML = '';
    }, 4500);
}

// Escuchar evento mostrarToast desde HX-Trigger del backend
document.body.addEventListener('mostrarToast', function(evt) {
    var bg = evt.detail.tipo === 'exito' ? 'bg-emerald-600' : 'bg-red-600';
    mostrarToast(evt.detail.mensaje, bg);
});
</script>
