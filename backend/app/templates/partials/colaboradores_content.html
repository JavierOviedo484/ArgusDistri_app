<div class="max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-xl font-bold text-slate-900">Colaboradores</h1>
            <p class="text-sm text-slate-500 mt-0.5">Personas que reciben facturas</p>
        </div>
        <button onclick="nuevoColab()" class="btn btn-primary">+ Nuevo</button>
    </div>

    <div class="card overflow-hidden p-0">
        <table class="w-full text-sm">
            <thead>
                <tr class="border-b border-slate-200 text-left text-slate-500 text-xs font-semibold uppercase tracking-wider">
                    <th class="p-3">RUC</th>
                    <th class="p-3">Nombre</th>
                    <th class="p-3">Email</th>
                    <th class="p-3">Teléfono</th>
                    <th class="p-3"></th>
                </tr>
            </thead>
            {% include "colaboradores_tabla.html" %}
        </table>
    </div>

    <!-- Modal -->
    <div id="modal-colab" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 w-full max-w-md shadow-xl border border-slate-200">
            <h3 class="text-lg font-bold text-slate-900 mb-4" id="modal-colab-title">Nuevo colaborador</h3>
            <form hx-post="/colaboradores/guardar" hx-ext="json-enc" hx-target="#tabla-colaboradores" hx-swap="outerHTML"
                  hx-on::after-request="if(event.detail.successful) document.getElementById('modal-colab').classList.add('hidden')">
                <div class="space-y-3">
                    <div>
                        <label class="text-xs font-medium text-slate-500 block mb-1">RUC / Cédula</label>
                        <input id="input-id" name="identificador" required class="input">
                    </div>
                    <div>
                        <label class="text-xs font-medium text-slate-500 block mb-1">Nombre</label>
                        <input id="input-nombre" name="nombre" required class="input">
                    </div>
                    <div>
                        <label class="text-xs font-medium text-slate-500 block mb-1">Email</label>
                        <input id="input-email" name="email" type="email" class="input">
                    </div>
                    <div>
                        <label class="text-xs font-medium text-slate-500 block mb-1">Teléfono</label>
                        <input id="input-telefono" name="telefono" class="input">
                    </div>
                </div>
                <div class="flex justify-end gap-2 mt-5">
                    <button type="button" onclick="document.getElementById('modal-colab').classList.add('hidden')"
                            class="btn btn-ghost">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function nuevoColab() {
    document.getElementById('modal-colab-title').textContent = 'Nuevo colaborador';
    document.getElementById('input-id').value = '';
    document.getElementById('input-id').readOnly = false;
    document.getElementById('input-nombre').value = '';
    document.getElementById('input-email').value = '';
    document.getElementById('input-telefono').value = '';
    document.getElementById('modal-colab').classList.remove('hidden');
    document.getElementById('input-id').focus();
}

function editarColab(id, nombre, email, telefono) {
    document.getElementById('modal-colab-title').textContent = 'Editar colaborador';
    document.getElementById('input-id').value = id;
    document.getElementById('input-id').readOnly = true;
    document.getElementById('input-nombre').value = nombre;
    document.getElementById('input-email').value = email;
    document.getElementById('input-telefono').value = telefono;
    document.getElementById('modal-colab').classList.remove('hidden');
    document.getElementById('input-nombre').focus();
}
</script>
