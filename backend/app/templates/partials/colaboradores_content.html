<div class="max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="text-xl font-bold">Colaboradores</h2>
            <p class="text-sm text-slate-400">Personas que reciben facturas</p>
        </div>
        <button onclick="document.getElementById('modal-colab').classList.remove('hidden')"
                class="btn btn-primary">
            + Nuevo
        </button>
    </div>

    <div class="bg-slate-900 rounded-lg overflow-hidden border border-slate-800">
        <table class="w-full text-sm">
            <thead>
                <tr class="border-b border-slate-800 text-left text-slate-400 text-xs uppercase tracking-wider">
                    <th class="p-3">RUC</th>
                    <th class="p-3">Nombre</th>
                    <th class="p-3">Email</th>
                    <th class="p-3">Teléfono</th>
                    <th class="p-3"></th>
                </tr>
            </thead>
            <tbody id="tabla-colaboradores">
                {% for c in colaboradores %}
                <tr class="border-b border-slate-800 hover:bg-slate-800/50">
                    <td class="p-3 font-mono text-xs">{{ c.identificador }}</td>
                    <td class="p-3 font-medium">{{ c.nombre }}</td>
                    <td class="p-3 text-slate-400">{{ c.email or '—' }}</td>
                    <td class="p-3 text-slate-400">{{ c.telefono or '—' }}</td>
                    <td class="p-3 text-right">
                        <button onclick="editarColab('{{ c.identificador }}','{{ c.nombre }}','{{ c.email or '' }}','{{ c.telefono or '' }}')"
                                class="text-xs text-brand hover:text-brand-light">Editar</button>
                        <button hx-delete="/api/v1/colaboradores/{{ c.identificador }}" hx-target="#tabla-colaboradores" hx-swap="outerHTML"
                                class="text-xs text-red-400 hover:text-red-300 ml-2">Eliminar</button>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="5" class="p-6 text-center text-slate-500">No hay colaboradores registrados</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <!-- Modal Nuevo/Editar -->
    <div id="modal-colab" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
        <div class="bg-slate-900 rounded-lg p-6 w-full max-w-md border border-slate-700">
            <h3 class="text-lg font-bold mb-4" id="modal-colab-title">Nuevo colaborador</h3>
            <form hx-post="/api/v1/colaboradores" hx-ext="json-enc" hx-target="#tabla-colaboradores"
                  hx-on::after-request="document.getElementById('modal-colab').classList.add('hidden')">
                <input type="hidden" id="edit-original-id" name="identificador_original" value="">
                <div class="space-y-3">
                    <div>
                        <label class="text-xs text-slate-400 block mb-1">RUC / Cédula</label>
                        <input id="input-id" name="identificador" required
                               class="w-full bg-slate-800 rounded px-3 py-2 text-sm border border-slate-700">
                    </div>
                    <div>
                        <label class="text-xs text-slate-400 block mb-1">Nombre</label>
                        <input id="input-nombre" name="nombre" required
                               class="w-full bg-slate-800 rounded px-3 py-2 text-sm border border-slate-700">
                    </div>
                    <div>
                        <label class="text-xs text-slate-400 block mb-1">Email</label>
                        <input id="input-email" name="email" type="email"
                               class="w-full bg-slate-800 rounded px-3 py-2 text-sm border border-slate-700">
                    </div>
                    <div>
                        <label class="text-xs text-slate-400 block mb-1">Teléfono</label>
                        <input id="input-telefono" name="telefono"
                               class="w-full bg-slate-800 rounded px-3 py-2 text-sm border border-slate-700">
                    </div>
                </div>
                <div class="flex justify-end gap-2 mt-5">
                    <button type="button" onclick="document.getElementById('modal-colab').classList.add('hidden')"
                            class="px-3 py-2 text-sm text-slate-400 hover:text-white">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function editarColab(id, nombre, email, telefono) {
    document.getElementById('modal-colab').classList.remove('hidden');
    document.getElementById('modal-colab-title').textContent = 'Editar colaborador';
    document.getElementById('input-id').value = id;
    document.getElementById('input-id').readOnly = true;
    document.getElementById('input-nombre').value = nombre;
    document.getElementById('input-email').value = email;
    document.getElementById('input-telefono').value = telefono;
}
</script>
