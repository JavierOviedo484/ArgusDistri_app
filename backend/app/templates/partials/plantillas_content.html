<div class="max-w-4xl mx-auto">
    <div class="mb-6">
        <h1 class="text-xl font-bold text-slate-900">Plantillas de mensajes</h1>
        <p class="text-sm text-slate-500 mt-0.5">Personaliza los mensajes que se envían por WhatsApp y email</p>
    </div>

    <div class="space-y-6">
        {% for p in plantillas %}
        <div class="card" id="plantilla-{{ p.id }}">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2">
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[11px] font-bold uppercase tracking-wider
                        {% if p.canal == 'whatsapp' %}bg-emerald-100 text-emerald-800{% else %}bg-blue-100 text-blue-800{% endif %}">
                        {{ p.canal }}
                    </span>
                    <span class="text-sm font-semibold text-slate-700">{{ p.descripcion }}</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="previewPlantilla({{ p.id }})"
                            class="btn btn-ghost btn-sm">👁️ Vista previa</button>
                    <button onclick="guardarPlantilla({{ p.id }}, this)"
                            class="btn btn-primary btn-sm">Guardar</button>
                </div>
            </div>

            {% if p.asunto %}
            <div class="mb-3">
                <label class="text-xs font-medium text-slate-500 block mb-1">Asunto (solo email)</label>
                <input id="asunto-{{ p.id }}" value="{{ p.asunto }}"
                       class="input font-mono">
            </div>
            {% endif %}

            <div>
                <label class="text-xs font-medium text-slate-500 block mb-1">Cuerpo del mensaje</label>
                <textarea id="cuerpo-{{ p.id }}" rows="6"
                    class="input font-mono resize-y">{{ p.cuerpo }}</textarea>
            </div>

            <div class="mt-2 text-xs text-slate-400">
                Variables disponibles: <code class="font-semibold text-blue-600">{nombre}</code> <code class="font-semibold text-blue-600">{periodo}</code> <code class="font-semibold text-blue-600">{monto}</code>
            </div>

            <div id="preview-{{ p.id }}" class="mt-3 hidden">
                <div class="bg-slate-50 border border-slate-200 rounded-lg p-4 text-sm whitespace-pre-wrap text-slate-700"></div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script>
function previewPlantilla(id) {
    const cuerpo = document.getElementById('cuerpo-' + id).value;
    const previewDiv = document.getElementById('preview-' + id);
    const rendered = cuerpo
        .replace(/\{nombre\}/g, 'Colaborador')
        .replace(/\{periodo\}/g, 'ENERO 2026')
        .replace(/\{monto\}/g, '100.00');
    previewDiv.querySelector('div').textContent = rendered;
    previewDiv.classList.remove('hidden');
}

function guardarPlantilla(id, btn) {
    const cuerpo = document.getElementById('cuerpo-' + id).value;
    const asuntoEl = document.getElementById('asunto-' + id);
    const data = { cuerpo: cuerpo };
    if (asuntoEl) data.asunto = asuntoEl.value;

    fetch('/api/v1/plantillas/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
    }).then(r => r.json()).then(() => {
        const orig = btn.textContent;
        btn.textContent = '✓ Guardado';
        btn.classList.remove('btn-primary');
        btn.classList.add('bg-emerald-600', 'text-white');
        setTimeout(() => { btn.textContent = orig; btn.classList.add('btn-primary'); btn.classList.remove('bg-emerald-600', 'text-white'); }, 2000);
    });
}
</script>
