<div class="max-w-4xl mx-auto">
    <div class="mb-6">
        <h2 class="text-xl font-bold">Plantillas de mensajes</h2>
        <p class="text-sm text-slate-400">Personaliza los mensajes que se envían por WhatsApp y email</p>
    </div>

    <div class="space-y-6">
        {% for p in plantillas %}
        <div class="bg-slate-900 rounded-lg border border-slate-800 p-5" id="plantilla-{{ p.id }}">
            <div class="flex items-center justify-between mb-3">
                <div>
                    <span class="inline-block px-2 py-0.5 rounded text-[10px] uppercase font-bold
                        {% if p.canal == 'whatsapp' %}bg-emerald-900/50 text-emerald-400{% else %}bg-blue-900/50 text-blue-400{% endif %}">
                        {{ p.canal }}
                    </span>
                    <span class="text-sm font-medium ml-2">{{ p.descripcion }}</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="previewPlantilla({{ p.id }})"
                            class="text-xs text-brand hover:text-brand-light">Vista previa</button>
                    <button onclick="guardarPlantilla({{ p.id }})"
                            class="btn btn-primary btn-sm">Guardar</button>
                </div>
            </div>

            {% if p.asunto %}
            <div class="mb-2">
                <label class="text-xs text-slate-500 block mb-1">Asunto (solo email)</label>
                <input id="asunto-{{ p.id }}" value="{{ p.asunto }}"
                       class="w-full bg-slate-800 rounded px-3 py-2 text-sm border border-slate-700 font-mono">
            </div>
            {% endif %}

            <div>
                <label class="text-xs text-slate-500 block mb-1">Cuerpo del mensaje</label>
                <textarea id="cuerpo-{{ p.id }}" rows="6"
                    class="w-full bg-slate-800 rounded px-3 py-2 text-sm border border-slate-700 font-mono">{{ p.cuerpo }}</textarea>
            </div>

            <div class="mt-2 text-xs text-slate-500">
                Variables disponibles: <code class="text-brand">{nombre}</code> <code class="text-brand">{periodo}</code> <code class="text-brand">{monto}</code>
            </div>

            <!-- Preview -->
            <div id="preview-{{ p.id }}" class="mt-3 hidden">
                <div class="bg-slate-950 rounded p-3 text-sm border border-slate-700 whitespace-pre-wrap font-mono text-slate-300"></div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script>
function previewPlantilla(id) {
    const cuerpo = document.getElementById('cuerpo-' + id).value;
    const previewDiv = document.getElementById('preview-' + id);
    const rendered = cuerpo
        .replace(/\{nombre\}/g, 'Colaborador')
        .replace(/\{periodo\}/g, 'ENERO 2026')
        .replace(/\{monto\}/g, '100.00');
    previewDiv.querySelector('div').textContent = rendered;
    previewDiv.classList.remove('hidden');
}

function guardarPlantilla(id) {
    const cuerpo = document.getElementById('cuerpo-' + id).value;
    const asuntoEl = document.getElementById('asunto-' + id);
    const data = { cuerpo: cuerpo };
    if (asuntoEl) data.asunto = asuntoEl.value;

    fetch('/api/v1/plantillas/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
    }).then(r => r.json()).then(() => {
        // feedback visual
        const btn = event.target;
        const orig = btn.textContent;
        btn.textContent = '✓ Guardado';
        btn.classList.add('bg-green-600');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('bg-green-600'); }, 2000);
    });
}
</script>
