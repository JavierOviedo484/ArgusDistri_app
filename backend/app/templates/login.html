<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGUS · Iniciar Sesión</title>
    <link rel="icon" type="image/svg+xml" href="/static/logo-argus.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }
        .login-box {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 4px 24px rgba(4,21,45,0.08);
        }
        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-area img {
            height: 100px;
            width: auto;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.375rem;
        }
        .form-group input {
            width: 100%;
            background: #ffffff;
            border: 1.5px solid #cbd5e1;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            color: #0f172a;
            font-size: 0.9375rem;
            outline: none;
            transition: all 0.15s ease;
            font-family: inherit;
        }
        .form-group input:focus {
            border-color: #0145bc;
            box-shadow: 0 0 0 3px rgba(1,69,188,0.12);
        }
        .btn-login {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #0145bc;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.9375rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
            letter-spacing: 0.5px;
        }
        .btn-login:hover {
            background: #013699;
            box-shadow: 0 4px 16px rgba(1,69,188,0.3);
            transform: translateY(-1px);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .error-msg {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.8125rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
        }
        .error-msg.visible {
            display: block;
        }
        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.6875rem;
            color: #94a3b8;
            letter-spacing: 1px;
        }
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top: 2.5px solid white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .spinner { display: block; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-area">
                <img src="/static/logo-argus.svg" alt="ARGUS">
            </div>

            {% if error %}
            <div class="error-msg visible">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login" id="login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                </div>
                <button type="submit" class="btn-login" id="login-btn">
                    <span class="btn-text">Iniciar Sesión</span>
                    <div class="spinner"></div>
                </button>
            </form>
            <div class="footer-text">ARGUS © 2026 · Todos los derechos reservados</div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            document.getElementById('login-btn').classList.add('loading');
        });
    </script>
</body>
</html>
