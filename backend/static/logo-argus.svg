<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 140" width="500" height="140">
  <defs>
    <linearGradient id="argus-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0145bc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#04152d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Icono - escudo estilizado -->
  <g transform="translate(10, 20)">
    <rect x="0" y="0" width="100" height="100" rx="16" fill="url(#argus-grad)"/>
    <text x="50" y="72" font-family="Arial Black, Impact, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle" letter-spacing="2">A</text>
    <line x1="22" y1="88" x2="78" y2="88" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="18" y1="94" x2="82" y2="94" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- Texto ARGUS -->
  <text x="135" y="72" font-family="'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif" font-size="62" font-weight="800" fill="#04152d" letter-spacing="4">ARGUS</text>
  <!-- Tagline -->
  <text x="135" y="105" font-family="'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600" fill="#0145bc" letter-spacing="6" text-transform="uppercase">DISTRIBUIDOR DE DOCUMENTOS</text>
</svg>
